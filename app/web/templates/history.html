{% extends "base.html" %}
{% block title %}审核历史 - safe-launch{% endblock %}

{% block content %}
<div class="mb-8">
    <h1 class="text-2xl font-bold text-white mb-2">📋 审核历史</h1>
    <p class="text-gray-400">浏览和查询全部审核记录</p>
</div>

<!-- 筛选栏 -->
<div class="card mb-6">
    <div class="flex flex-wrap gap-4 items-end">
        <div>
            <label class="block text-xs text-gray-400 mb-1">审核状态</label>
            <select id="filter-status" class="select">
                <option value="">全部状态</option>
                {% for s in statuses %}
                <option value="{{ s }}">{{ s }}</option>
                {% endfor %}
            </select>
        </div>
        <div>
            <label class="block text-xs text-gray-400 mb-1">审核维度</label>
            <select id="filter-dimension" class="select">
                <option value="">全部维度</option>
                {% for d in dimensions %}
                <option value="{{ d }}">{{ d }}</option>
                {% endfor %}
            </select>
        </div>
        <div>
            <label class="block text-xs text-gray-400 mb-1">每页数量</label>
            <select id="filter-page-size" class="select w-24">
                <option value="10">10</option>
                <option value="20" selected>20</option>
                <option value="50">50</option>
            </select>
        </div>
        <button id="search-btn" class="btn btn-primary h-10">查询</button>
        <span id="total-hint" class="text-sm text-gray-500 ml-2"></span>
    </div>
</div>

<!-- 记录表格 -->
<div class="card">
    <div class="overflow-x-auto">
        <table class="w-full text-sm">
            <thead>
                <tr class="text-left text-gray-400 border-b border-gray-700">
                    <th class="pb-3 pr-4 w-16">序号</th>
                    <th class="pb-3 pr-4">内容摘要</th>
                    <th class="pb-3 pr-4 w-24">维度</th>
                    <th class="pb-3 pr-4 w-24">状态</th>
                    <th class="pb-3 pr-4 w-20">风险</th>
                    <th class="pb-3 w-28">时间</th>
                </tr>
            </thead>
            <tbody id="records-body">
                <tr><td colspan="6" class="py-8 text-center text-gray-500">点击"查询"加载数据</td></tr>
            </tbody>
        </table>
    </div>

    <!-- 分页 -->
    <div id="pagination" class="flex items-center justify-between mt-4 pt-4 border-t border-gray-700" style="display:none;">
        <div class="text-sm text-gray-400" id="page-info"></div>
        <div class="flex gap-2" id="page-buttons"></div>
    </div>
</div>

<!-- 详情弹窗 -->
<div id="detail-modal" class="fixed inset-0 bg-black/60 z-50 flex items-center justify-center" style="display:none;" onclick="if(event.target===this)closeDetail()">
    <div class="bg-gray-800 rounded-xl border border-gray-700 max-w-2xl w-full mx-4 max-h-[80vh] overflow-y-auto">
        <div class="flex items-center justify-between p-6 border-b border-gray-700">
            <h2 class="text-lg font-semibold text-white">审核详情</h2>
            <button onclick="closeDetail()" class="text-gray-400 hover:text-white text-xl">&times;</button>
        </div>
        <div id="detail-content" class="p-6"></div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    let currentPage = 1;
    let totalPages = 1;

    document.getElementById('search-btn').addEventListener('click', () => {
        currentPage = 1;
        loadRecords();
    });

    document.getElementById('filter-status').addEventListener('change', () => {
        currentPage = 1;
        loadRecords();
    });

    document.getElementById('filter-dimension').addEventListener('change', () => {
        currentPage = 1;
        loadRecords();
    });

    document.getElementById('filter-page-size').addEventListener('change', () => {
        currentPage = 1;
        loadRecords();
    });

    // 检查 URL 参数，加载指定记录详情
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('record_id')) {
        loadRecordDetail(urlParams.get('record_id'));
    }

    loadRecords();

    async function loadRecords() {
        const status = document.getElementById('filter-status').value;
        const dimension = document.getElementById('filter-dimension').value;
        const pageSize = document.getElementById('filter-page-size').value;

        const params = new URLSearchParams({ page: currentPage, page_size: pageSize });
        if (status) params.set('status', status);
        if (dimension) params.set('review_dimension', dimension);

        try {
            const resp = await fetch(`/api/v1/history/records?${params}`);
            const data = await resp.json();
            renderTable(data);
            renderPagination(data);
            document.getElementById('total-hint').textContent = `共 ${data.total} 条`;
        } catch (err) {
            showToast('加载失败: ' + err.message, 'error');
        }
    }

    function renderTable(data) {
        const tbody = document.getElementById('records-body');
        if (!data.items || data.items.length === 0) {
            tbody.innerHTML = '<tr><td colspan="6" class="py-8 text-center text-gray-500">暂无记录</td></tr>';
            return;
        }
        tbody.innerHTML = data.items.map((r, i) => `
            <tr class="tr-row" onclick="loadRecordDetail('${r.id}')">
                <td class="py-3 pr-4 text-gray-500">${(data.page - 1) * data.page_size + i + 1}</td>
                <td class="py-3 pr-4 text-gray-300 max-w-xs truncate">${escapeHtml(r.content.substring(0, 60))}${r.content.length > 60 ? '...' : ''}</td>
                <td class="py-3 pr-4 text-gray-400 text-xs">${r.review_dimension}</td>
                <td class="py-3 pr-4 text-xs">${statusBadge(r.status)}</td>
                <td class="py-3 pr-4 text-xs">${r.risk_level ? `<span class="risk-${r.risk_level} font-semibold">${r.risk_level.toUpperCase()}</span>` : '<span class="text-gray-500">-</span>'}</td>
                <td class="py-3 text-gray-500 text-xs">${new Date(r.created_at).toLocaleString('zh-CN', {month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'})}</td>
            </tr>
        `).join('');
    }

    function renderPagination(data) {
        const pagination = document.getElementById('pagination');
        if (data.total <= data.page_size) {
            pagination.style.display = 'none';
            return;
        }
        pagination.style.display = '';

        totalPages = Math.ceil(data.total / data.page_size);
        document.getElementById('page-info').textContent = `第 ${data.page}/${totalPages} 页，共 ${data.total} 条`;

        let btns = '';
        btns += `<button class="btn bg-gray-700 text-white hover:bg-gray-600 text-sm" onclick="goPage(${data.page - 1})" ${data.page <= 1 ? 'disabled' : ''}>上一页</button>`;
        for (let p = Math.max(1, data.page - 2); p <= Math.min(totalPages, data.page + 2); p++) {
            const active = p === data.page ? 'bg-indigo-600 text-white' : 'bg-gray-700 text-white hover:bg-gray-600';
            btns += `<button class="btn ${active} text-sm" onclick="goPage(${p})">${p}</button>`;
        }
        btns += `<button class="btn bg-gray-700 text-white hover:bg-gray-600 text-sm" onclick="goPage(${data.page + 1})" ${data.page >= totalPages ? 'disabled' : ''}>下一页</button>`;
        document.getElementById('page-buttons').innerHTML = btns;
    }

    function goPage(page) {
        if (page < 1 || page > totalPages) return;
        currentPage = page;
        loadRecords();
    }

    async function loadRecordDetail(id) {
        try {
            const resp = await fetch(`/api/v1/history/records/${id}`);
            const data = await resp.json();
            renderDetail(data);
            document.getElementById('detail-modal').style.display = '';
        } catch (err) {
            showToast('加载详情失败: ' + err.message, 'error');
        }
    }

    function renderDetail(data) {
        const riskColors = { low: 'text-green-400', medium: 'text-yellow-400', high: 'text-orange-400', critical: 'text-red-400' };
        const riskColor = riskColors[data.risk_level] || 'text-gray-400';

        let html = `
            <div class="grid grid-cols-2 gap-4 mb-6">
                <div><span class="text-gray-400 text-xs">审核 ID</span><p class="text-white text-sm font-mono">${data.id}</p></div>
                <div><span class="text-gray-400 text-xs">审核维度</span><p class="text-white text-sm">${data.review_dimension}</p></div>
                <div><span class="text-gray-400 text-xs">状态</span><p class="text-sm">${statusBadge(data.status)}</p></div>
                <div><span class="text-gray-400 text-xs">风险等级</span><p class="text-sm"><span class="${riskColor} font-semibold">${data.risk_level ? data.risk_level.toUpperCase() : 'N/A'}</span></p></div>
                <div><span class="text-gray-400 text-xs">创建时间</span><p class="text-white text-sm">${new Date(data.created_at).toLocaleString('zh-CN')}</p></div>
                <div><span class="text-gray-400 text-xs">处理耗时</span><p class="text-white text-sm">${data.processing_time_ms ? data.processing_time_ms + 'ms' : '-'}</p></div>
                ${data.degraded ? `<div class="col-span-2"><span class="text-yellow-400 text-xs">⚠ 降级运行</span><p class="text-gray-300 text-sm">跳过: ${data.skipped_layers?.join(', ') || '-'}</p></div>` : ''}
            </div>
            <div class="mb-6">
                <span class="text-gray-400 text-xs">审核内容</span>
                <div class="mt-1 p-3 rounded-lg bg-gray-700/50 text-white text-sm max-h-40 overflow-y-auto whitespace-pre-wrap">${escapeHtml(data.content)}</div>
            </div>`;

        if (data.layers && data.layers.length > 0) {
            html += '<h3 class="text-sm font-semibold text-gray-400 mb-3">各层检测详情</h3>';
            data.layers.forEach(layer => {
                const icon = layer.layer === 'keyword' ? '🔍' : layer.layer === 'rag' ? '📚' : layer.layer === 'validator' ? '🖼' : '🤖';
                const name = layer.layer === 'keyword' ? 'L1 关键词匹配' : layer.layer === 'rag' ? 'L2 RAG 法规检索' : layer.layer === 'validator' ? '格式校验' : layer.layer === 'external_detector' ? '外部检测' : layer.layer;
                const status = layer.is_violation === true ? '<span class="text-red-400">⚠ 违规</span>'
                    : layer.is_violation === false ? '<span class="text-green-400">✓ 通过</span>'
                    : '<span class="text-gray-400">- 未生效</span>';
                html += `
                    <div class="mb-3 p-3 rounded-lg bg-gray-700/30 border border-gray-700">
                        <div class="flex items-center justify-between mb-1">
                            <span class="text-sm font-semibold text-white">${icon} ${name}</span>
                            <span class="text-xs">${status}</span>
                        </div>
                        ${layer.details && Object.keys(layer.details).length ? `<pre class="text-xs text-gray-400 mt-2 overflow-x-auto">${escapeHtml(JSON.stringify(layer.details, null, 2))}</pre>` : ''}
                    </div>`;
            });
        }

        document.getElementById('detail-content').innerHTML = html;
    }

    function closeDetail() {
        document.getElementById('detail-modal').style.display = 'none';
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
</script>
{% endblock %}
